[formatting]
  align_comments = true
  align_entries  = true
  indent_entries = true
  indent_tables  = true
  reorder_arrays = false # Be caution with reorder_arrays when set to true
  reorder_keys   = true

[[rule]]
  include = ["chezmoi/dot_config/pet/**/*.toml"]

  # Reorder arrays for pet config file will make pet cli doesn't work
  # Because cmd = ["sh", "-c"] will formatted to  cmd = ["-c", "sh"]
  # It's wrong format because pet will run shell command "sh -c" which is flag is on the end, not in the beginning
  # Don't use default 'taplo' config in conform.nvim, because it bug, the rule is ignored . Just use `taplo fmt` manually
  [rule.formatting]
    reorder_arrays = false
