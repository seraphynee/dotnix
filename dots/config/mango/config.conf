# =========================
# Appearance: Theme & Gaps
# =========================
borderpx=3
gappih=8
gappiv=8
gappoh=8
gappov=8

# Root/background color
rootcolor=0x201b14ff
# Inactive window border
bordercolor=0x44444400
# Active window border
focuscolor=0xc9b890ff
# Urgent window border
urgentcolor=0xad401fff

# Cursor
cursor_size=24
cursor_theme=Bibata-Modern-Ice

# ==================
# Window Effects
# ==================
# Blur
blur=0
blur_layer=1
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# Shadows
shadows=1
layer_shadows=1
shadow_only_floating=1
shadows_size=12
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

# Opacity & Corner Radius
border_radius=6
# no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation
animations=0
layer_animations=1
animation_type_open=fade
animation_type_close=fade
layer_animation_type_open=fade
layer_animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.5
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
animation_duration_move=200
animation_duration_open=150
animation_duration_tag=300
animation_duration_close=300
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadein=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5

# =======================
# Window Management
# =======================
# Scroller layout
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master stack
new_is_master=1
smartgaps=0
default_mfact=0.55
default_nmaster=1

# Overview
hotarea_size=10
enable_hotarea=1
hotarea_corner=2
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Scratchpad
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
scratchpadcolor=0x516c93ff

# =======================
# Startup
# =======================
exec-once=wl-clip-persist --clipboard regular --reconnect-tries 0
exec-once=wl-paste --type text --watch cliphist store
exec-once=noctalia-shell

# =======================
# External Config Imports
# =======================
source=./bind.conf
source=./env.conf
source=./inputs.conf
source=./monitor.conf
source=./rules.conf
