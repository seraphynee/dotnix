bind=SUPER+SHIFT,r,reload_config

# === LAYOUTS ===
bind=SUPER,n,switch_layout
bind=SUPER,t,setlayout,tile
bind=SUPER,s,setlayout,scroller

# === APPS ===
bind=SUPER,D,spawn,equibop
bind=SUPER,P,spawn,1password
bind=SUPER,Q,killclient
bind=SUPER,S,spawn,slack
bind=SUPER,X,spawn,firefox
bind=SUPER,Z,spawn,zen-beta
bind=SUPER,Return,spawn,ghostty
# bind=SUPER,Space,spawn,fuzzel

# === WINDOW KEYBIND ===
# Window Focus
bind=SUPER,H,focusdir,left
bind=SUPER,J,focusdir,down
bind=SUPER,K,focusdir,up
bind=SUPER,L,focusdir,right

bind=SUPER+SHIFT,Tab,focusstack,next
bind=SUPER,Tab,focuslast

# Move window in direction in the same tag
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,L,exchange_client,right

# Move window to the selected tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Scratchpad minimized
bind=SUPER,i,minimized
bind=SUPER+SHIFT,i,restore_minimized

# Toggle
bind=SUPER,G,toggleglobal
bind=SUPER,F,togglefullscreen
bind=SUPER+ALT,F,togglefloating
bind=SUPER+CTRL,F,togglefakefullscreen

bind=SUPER,O,toggleoverlay
bind=ALT,M,togglemaximizescreen

# toggle (show/hide) the scratchpad
bind=ALT,Z,toggle_scratchpad
bind=ALT,Tab,toggleoverview

# Mouse Window manipulation
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_right,killclient

bind=SUPER+ALT,minus,resizewin,-200,0
bind=SUPER+ALT,equal,resizewin,+200,0

# === TAG ===
# Switch between tag left / right that have window inside the tag
bind=CTRL+SUPER,H,viewtoleft_have_client,0
bind=CTRL+SUPER,L,viewtoright_have_client,0

bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0

# Move window to selected tag
bind=CTRL+SUPER+SHIFT,H,tagtoleft,0
bind=CTRL+SUPER+SHIFT,L,tagtoright,0

# Tag/view navigation
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Overview mode (requires NONE modifier)
mousebind=SUPER+SHIFT,btn_left,toggleoverview,1
mousebind=SUPER+SHIFT,btn_right,killclient,0
mousebind=NONE,btn_middle,togglemaximizescreen,0

# clear last clipboard history,useful for secret related copied
bind = SUPER+SHIFT,V,spawn_shell,cliphist list | head -n 1 | cut -f1 | cliphist delete
# clear all clipboard history
bind = SUPER+CTRL+SHIFT,V,spawn_shell,cliphist wipe

# === Noctalia ===
bind = SUPER,Space,spawn,noctalia-shell ipc call launcher toggle
# bind = SUPER, S, spawn, noctalia-shell ipc call controlCenter toggle
bind = SUPER,comma,spawn,noctalia-shell ipc call settings toggle
bind = SUPER,V,spawn,noctalia-shell ipc call launcher clipboard
bind = CTRL+ALT,Q,spawn,noctalia-shell ipc call lockScreen lock
bind = CTRL+ALT+SHIFT,Q,spawn,noctalia-shell ipc call sessionMenu toggle
bind = SUPER+SHIFT,T,spawn,noctalia-shell ipc call bar toggle
bind = CTRL+SUPER,T,spawn,noctalia-shell ipc call wallpaper toggle
bind = CTRL+ALT,Delete,spawn,noctalia-shell ipc call sessionMenu toggle

# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn, noctalia-shell ipc call volume increase
bind=NONE,XF86AudioLowerVolume,spawn, noctalia-shell ipc call volume decrease
bind=NONE,XF86AudioMute,spawn, noctalia-shell ipc call volume muteOutput
bind=NONE,XF86MonBrightnessUp,spawn, noctalia-shell ipc call brightness increase
bind=NONE,XF86MonBrightnessDown,spawn, noctalia-shell ipc call brightness decrease

bind = ALT+SHIFT, 2, spawn_shell, GEOM="$(slurp)" && sleep 0.1 && grim -g "$GEOM" - | wl-copy
bind = ALT+SHIFT, 3, spawn_shell, grim - | wl-copy

bind = ALT+SHIFT, 4, spawn_shell, GEOM="$(slurp)" && sleep 0.1 && grim -g "$GEOM" - | swappy -f -
bind = ALT+SHIFT, 5, spawn_shell, grim - | swappy -f -
