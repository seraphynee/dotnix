# Layouts
bind=SUPER,n,switch_layout # cycle through layouts
# Set specific layout
bind=SUPER,t,setlayout,tile
bind=SUPER,s,setlayout,scroller

# Scratchpad
bind=SUPER,i,minimized # send current window to scratchpad
bind=ALT,z,toggle_scratchpad # toggle (show/hide) the scratchpad
bind=SUPER+SHIFT,i,restore_minimized # retrieve window from scratchpad (restore)


bind=SUPER,Q,killclient
bindl=SUPER,L,spawn,swaylock

# Apps
bind=SUPER,T,ghostty
bind=SUPER,Z,zen
bind=SUPER,X,firefox

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER+SHIFT,Q,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
