# Keep this file host-agnostic by default.
# Add monitor rules only when display names are stable on the target host.
# Host-specific monitor rules for external displays should live outside the
# shared installer path, otherwise laptop sessions can start on the wrong
# output and look like a frozen graphical login.
# Example:
# monitorrule=name:eDP-1,width:1920,height:1200,refresh:60,x:0,y:0,scale:1.25
# monitorrule=name:DP-5,width:3840,height:2160,refresh:60,x:0,y:0,scale:1.5
