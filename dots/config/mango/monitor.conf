# Keep this file host-agnostic by default.
# Add monitor rules only when display names are stable on the target host.
# Example:
# monitorrule=name:DP-5,width:3840,height:2160,refresh:60,x:0,y:0,scale:1.5
# Keep external monitors on auto-placement so laptops extend instead of mirror.
monitorrule=make:Xiaomi Corporation,width:3840,height:2160,refresh:60,scale:1.5
monitorrule=make:BNQ,width:1920,height:1080,refresh:239.99,scale:1
monitorrule=make:Samsung Display Corp.,width:2880,height:1800,refresh:90,x:0,y:0,scale:1.8

# Switch bindings can dispatch Mango commands directly, so avoid wrapping
# disable/enable_monitor in `spawn mmsg ...` where the extra commas and
# hard-coded connector name can make the bind fragile.
switchbind=fold,disable_monitor,make:Samsung Display Corp.
switchbind=unfold,enable_monitor,make:Samsung Display Corp.
