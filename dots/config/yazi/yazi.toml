[mgr]
  linemode     = "mtime"
  ratio        = [1, 3, 5]
  show_hidden  = false
  sort_by      = "mtime"   # sort by last modified time
  sort_reverse = true

[[plugin.prepend_fetchers]]
  id   = "git"
  name = "*"
  run  = "git"

[[plugin.prepend_fetchers]]
  id   = "git"
  name = "*/"
  run  = "git"
